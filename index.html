const COLORS = {'券商债AAA': '#1f77b4', '中短期票据AAA': '#ff7f0e'};
const NAMES = {'券商债AAA': '券商债 AAA（税率3%）', '中短期票据AAA': '中短期票据 AAA（税率3%）'};

// ── 凸点检测（含全局最优）────────────────────────
function detectConvexity(data, curveName) {
  const points = [];
  const returns = data.filter(d => d[10] !== null);
  if (returns.length < 5) return points;
  
  // 全局最优（最高持有收益点）
  let globalBest = returns[0];
  returns.forEach(r => { if (r[10] > globalBest[10]) globalBest = r; });
  points.push({
    tenor: globalBest[0], ytm: globalBest[1], ret: globalBest[10],
    type: '全局最优', severity: 'best'
  });
  
  // 局部极值（前后各2点，过滤小幅噪音）
  for (let i = 2; i < returns.length - 2; i++) {
    const prev2 = returns[i-2][10], prev1 = returns[i-1][10];
    const curr  = returns[i][10];
    const next1 = returns[i+1][10], next2 = returns[i+2][10];
    
    const isLocalMin = curr < prev1 && curr < prev2 && curr < next1 && curr < next2;
    const isLocalMax = curr > prev1 && curr > prev2 && curr > next1 && curr > next2 && returns[i][0] < 9;
    
    if (isLocalMin || isLocalMax) {
      if (Math.abs(curr - globalBest[10]) < 0.005) continue; // skip if same as global best
      points.push({
        tenor: returns[i][0], ytm: returns[i][1], ret: curr,
        type: isLocalMin ? '局部低谷' : '局部峰值',
        severity: isLocalMin ? 'valley' : 'peak'
      });
    }
  }
  return points;
}

const allConvexity = {};
const seriesYield = [], seriesReturn = [], seriesDecomp = [];

CURVES.forEach(name => {
  const data = RAW[name];
  const convexPts = detectConvexity(data, name);
  allConvexity[name] = convexPts;
  
  // 收益率曲线
  seriesYield.push({name: NAMES[name], type:'line', data: data.filter(d=>d[1]!==null).map(d=>[d[0],d[1]]), smooth:true, symbol:'none', lineStyle:{color:COLORS[name],width:2}});
  
  // 持有收益（凸点着色）
  const retData = data.filter(d=>d[10]!==null).map(d=>{
    const t=d[0], ret=d[10];
    const cp = convexPts.find(p=>Math.abs(p.tenor-t)<0.01);
    if (cp) {
      const c = cp.severity==='best'?'#1565c0':(cp.severity==='peak'?'#c62828':(cp.severity==='valley'?'#2e7d32':'#e65100'));
      return {value:[t,ret], itemStyle:{color:c,borderColor:c,borderWidth:2}, symbolSize:8, symbol:'circle'};
    }
    return {value:[t,ret], symbolSize:3};
  });
  seriesReturn.push({name: NAMES[name], type:'line', data: retData, smooth:true, symbol:'circle', symbolSize:3, lineStyle:{color:COLORS[name],width:2}});
  
  // 分解
  seriesDecomp.push({name: name+' 持有收益', type:'line', data: retData.map(d=>d.value), smooth:true, lineStyle:{color:COLORS[name],width:2.5}, symbol:'none'});
  seriesDecomp.push({name: name+' 票息收益', type:'line', data: data.filter(d=>d[10]!==null).map(d=>[d[0],d[4]]), smooth:true, lineStyle:{color:COLORS[name],width:1.5,dashStyle:'dash'}, symbol:'none',

  seriesDecomp.push({name: name+' 骑乘贡献', type:'line', data: data.filter(d=>d[10]!==null).map(d=>[d[0],d[9]]), smooth:true, lineStyle:{color:COLORS[name],width:1.5,dashStyle:'dashdot'}, symbol:'none',
    legendHoverLink:false});
});

}).join('');
